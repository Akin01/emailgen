name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: emailgen
            asset_name: emailgen-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: emailgen.exe
            asset_name: emailgen-windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: emailgen
            asset_name: emailgen-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: emailgen
            asset_name: emailgen-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ../../../${{ matrix.asset_name }}.zip
          else
            tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          fi
          cd ../../../

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.asset_name }}.zip
            ${{ matrix.asset_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ github.token }}
